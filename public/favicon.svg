<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b6fd4"/>
      <stop offset="100%" stop-color="#5548b0"/>
    </radialGradient>
    <radialGradient id="orangeGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#ffcc00"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc4a00"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="4"/>

  <!-- Middle ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="4"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="42" fill="none" stroke="rgba(255,255,255,0.80)" stroke-width="4"/>

  <!-- Center orange orb -->
  <circle cx="100" cy="100" r="26" fill="url(#orangeGrad)"/>
</svg>
